<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - IAFECOLE</title>
  <link rel="stylesheet" href="style.css">
  <!-- Chargement du client Supabase depuis le CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Barre de navigation -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span>IAFECOLE</span>
      </a>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Accueil</a></li>
        <li><a href="login.html" class="btn btn-outline">Se connecter</a></li>
      </ul>
    </div>
  </header>

  <!-- Conteneur d'authentification -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Inscription</h2>
      <p class="auth-subtitle">Créez votre compte étudiant IAFECOLE</p>

      <!-- Message d'alerte pour les retours utilisateurs -->
      <div id="alert-box" class="alert hidden"></div>

      <form id="signup-form">
        <div class="form-group">
          <label for="signup-email" class="form-label">Adresse Email</label>
          <input type="email" id="signup-email" class="form-input" placeholder="étudiant@inspem.fr" required>
        </div>

        <div class="form-group">
          <label for="signup-password" class="form-label">Mot de passe</label>
          <input type="password" id="signup-password" class="form-input" placeholder="Minimum 6 caractères" minlength="6" required>
        </div>

        <div class="form-group">
          <label for="signup-year" class="form-label">Année Académique</label>
          <select id="signup-year" class="form-select" required>
            <option value="" disabled selected>Choisissez votre année académique</option>
            <option value="1ère année INSPEM">1ère année INSPEM</option>
            <option value="2ème année INSPEM">2ème année INSPEM</option>
            <option value="3ème année INSPEM">3ème année INSPEM</option>
          </select>
        </div>

        <button type="submit" id="btn-submit" class="btn btn-primary auth-btn">
          S'inscrire
        </button>
      </form>

      <div class="auth-footer">
        Déjà inscrit ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <!-- Script principal pour gérer l'authentification -->
  <script src="script.js"></script>
</body>
</html>
