<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - IAFECOLE</title>
  <link rel="stylesheet" href="style.css">
  <!-- Chargement du client Supabase depuis le CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Barre de navigation -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span>IAFECOLE</span>
      </a>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Accueil</a></li>
        <li><a href="signup.html" class="btn btn-outline">S'inscrire</a></li>
      </ul>
    </div>
  </header>

  <!-- Conteneur d'authentification -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Connexion</h2>
      <p class="auth-subtitle">Accédez à vos cours et ressources éducatives</p>

      <!-- Message d'alerte pour les retours utilisateurs -->
      <div id="alert-box" class="alert hidden"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="login-email" class="form-label">Adresse Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="exemple@inspem.fr" required>
        </div>

        <div class="form-group">
          <label for="login-password" class="form-label">Mot de passe</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
        </div>

        <button type="submit" id="btn-submit" class="btn btn-primary auth-btn">
          Se connecter
        </button>
      </form>

      <div class="auth-footer">
        Nouveau sur IAFECOLE ? <a href="signup.html">Créer un compte</a>
      </div>
    </div>
  </div>

  <!-- Script principal pour gérer l'authentification -->
  <script src="script.js"></script>
</body>
</html>
